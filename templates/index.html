<!DOCTYPE html>
<html>
<head>
    <title>{{ server_name }}</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #0f172a;
            color: #e2e8f0;
        }
        h1 { color: #38bdf8; }
        .box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 8px 12px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input {
            padding: 6px;
        }
    </style>
</head>
<body>

<h1>{{ server_name }} ({{ node }})</h1>

<div class="box">
    <h3>Status: {{ "🟢 UP" if healthy else "🔴 DOWN" }}</h3>
</div>

<div class="box">
    <h3>Upload File</h3>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file">
        <button type="submit">Upload</button>
    </form>
</div>

<div class="box">
    <h3>Files</h3>
    <ul>
        {% for f in files %}
        <li>
            {{ f }}
            <a href="/download/{{ f }}">⬇️</a>
            <form action="/delete/{{ f }}" method="post" style="display:inline;">
                <button>❌</button>
            </form>
        </li>
        {% endfor %}
    </ul>
</div>

<div class="box">
    <h3>Peers</h3>
    <ul>
        {% for p in peers %}
        <li>{{ p.id }} → {{ p.addr }}</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
